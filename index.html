<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube - Maintenance</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --m3-primary: #d0bcff; --m3-on-primary: #381e72; --bg: #000; --surf: #1c1b1f; --text: #fff; --m3-surf-container: #2b2930; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; }

        /* 起動アニメーション（維持） */
        #boot-loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .boot-logo { width: 160px; aspect-ratio: 16/9; margin-bottom: 24px; animation: pulse 2s infinite; }
        .progress-bar { width: 200px; height: 4px; background: var(--surf); border-radius: 2px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--m3-primary); animation: load 1.5s forwards; }
        @keyframes load { to { width: 100%; } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* ヘッダー（ロゴ維持、検索無効化） */
        header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg); display: flex; align-items: center; padding: 0 16px; z-index: 1000; box-sizing: border-box; }
        .logo { height: 48px; aspect-ratio: 16/9; object-fit: contain; }

        /* メンテナンス画面のスタイル */
        main { margin-top: 70px; height: calc(100vh - 145px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .mnt-icon { font-size: 80px; color: var(--m3-primary); margin-bottom: 20px; animation: rotate 4s linear infinite; }
        .mnt-title { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .mnt-text { font-size: 14px; opacity: 0.7; line-height: 1.6; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ナビゲーションバー（維持） */
        nav { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); height: 75px; background: var(--surf); border-radius: 38px; display: flex; align-items: center; padding: 0 10px; gap: 5px; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); opacity: 0.8; }
        .nav-item { width: 60px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: not-allowed; }
        .fab { width: 56px; height: 56px; background: var(--m3-surf-container); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--m3-outline); }
    </style>
</head>
<body>

<div id="boot-loader">
    <img src="logo.png" class="boot-logo" onerror="this.src='https://placehold.jp/381e72/d0bcff/160x90.png?text=YangTube'">
    <div class="progress-bar"><div class="progress-fill"></div></div>
</div>

<header>
    <img src="logo.png" class="logo" onerror="this.src='https://placehold.jp/381e72/d0bcff/160x90.png?text=Logo'">
</header>

<main>
    <span class="material-symbols-rounded mnt-icon">build</span>
    <div class="mnt-title">ただいまメンテナンス中です</div>
    <div class="mnt-text">
        大規模アップデートの準備をしています。<br>
        GASとFirebaseへの移行、および広告検知システムの<br>
        構築を行っております。もうしばらくお待ちください。
    </div>
</main>

<nav>
    <div class="nav-item"><span class="material-symbols-rounded" style="color:var(--m3-primary)">home</span></div>
    <div class="nav-item"><span class="material-symbols-rounded">search</span></div>
    <div class="fab"><span class="material-symbols-rounded">construction</span></div>
    <div class="nav-item"><span class="material-symbols-rounded">subscriptions</span></div>
    <div class="nav-item"><span class="material-symbols-rounded">settings</span></div>
</nav>

<script>
    window.onload = () => {
        // 起動アニメーションを1.5秒表示してから消す
        setTimeout(() => {
            const loader = document.getElementById('boot-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
        }, 1500);
    };
</script>

</body>
</html>
