<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.6.8</title>
    <!-- ホーム画面用アイコン -->
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --m3-primary: #d0bcff; --m3-on-primary: #381e72; --bg: #000; --surf: rgba(28, 27, 31, 0.7); --text: #fff; --card: #111;
            --m3-outline: #938f99; --accent: #d0bcff;
        }
        body.light {
            --bg: #fef7ff; --surf: rgba(243, 237, 247, 0.7); --text: #1c1b1f; --m3-primary: #6750a4; --card: #fff;
            --m3-outline: #79747e; --accent: #6750a4;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow: hidden; transition: 0.3s; }
        
        /* ヘッダー・ロゴ */
        header { position: fixed; top: 0; width: 100%; height: 65px; background: var(--bg); display: flex; align-items: center; padding: 0 16px; z-index: 1000; gap: 12px; }
        .logo-img { height: 28px; cursor: pointer; } /* ここでロゴ画像を表示 */
        .search-box { flex: 1; height: 42px; background: var(--surf); backdrop-filter: blur(10px); border-radius: 24px; display: flex; align-items: center; padding: 0 16px; border: 1px solid rgba(255,255,255,0.1); }
        .search-box input { background: none; border: none; color: var(--text); flex: 1; outline: none; }

        /* Liquid Glass タブバー */
        nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            height: 72px; width: 90%; max-width: 500px;
            background: var(--surf); backdrop-filter: blur(20px) saturate(180%);
            border-radius: 36px; display: flex; align-items: center; justify-content: space-around; 
            z-index: 2000; border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; }
        .nav-item p { font-size: 10px; margin-top: 4px; font-weight: bold; }

        /* M3 Switch (綺麗な楕円形) */
        .m3-switch { 
            position: relative; width: 52px; height: 32px; 
            background: var(--m3-outline); border-radius: 100px; /* 100pxで完全な楕円に */
            cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .m3-switch.on { background: var(--accent); }
        .m3-switch::after { 
            content: ""; position: absolute; top: 4px; left: 4px; 
            width: 24px; height: 24px; background: #fff; border-radius: 50%; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .m3-switch.on::after { left: 24px; background: var(--m3-on-primary); }

        /* コンテンツ */
        main { margin-top: 115px; height: calc(100vh - 200px); overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .v-card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; border-radius: 16px; object-fit: cover; background: #222; }

        /* 設定画面 */
        .set-card { background: var(--surf); padding: 16px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .history-list { font-size: 11px; color: gray; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 16px; line-height: 1.6; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" class="logo-img" onclick="tab('home')" id="main-logo" onerror="this.src='icon.png'">
    <div class="search-box">
        <input type="text" id="q" placeholder="動画を検索" onkeypress="if(event.key==='Enter') search()">
        <span class="material-symbols-rounded" onclick="search()">search</span>
    </div>
</header>

<div id="cats-bar" style="position:fixed; top:65px; width:100%; display:flex; gap:8px; padding:8px 16px; overflow-x:auto; z-index:999; background:var(--bg);">
    <button class="refresh-btn" onclick="fetchHome()" style="background:var(--surf); border:none; border-radius:50%; width:40px; height:40px; color:white;"><span class="material-symbols-rounded">refresh</span></button>
    <button class="chip" onclick="setCat('すべて', this)">すべて</button>
    <button class="chip" onclick="setCat('Minecraft', this)">Minecraft</button>
    <button class="chip" onclick="setCat('ガジェット', this)">ガジェット</button>
</div>

<main id="view"></main>

<nav>
    <div class="nav-item active" id="n-home" onclick="tab('home')"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
    <div class="nav-item" id="n-search" onclick="tab('search')"><span class="material-symbols-rounded">search</span><p>検索</p></div>
    <div class="nav-item" id="n-subs" onclick="tab('subs')"><span class="material-symbols-rounded">subscriptions</span><p>登録済み</p></div>
    <div class="nav-item" id="n-sets" onclick="tab('sets')"><span class="material-symbols-rounded">settings</span><p>設定</p></div>
</nav>

<script>
    const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo'; // ここにキーを入れてください！

    window.onload = () => fetchHome();

    function tab(name) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('n-'+name).classList.add('active');
        const v = document.getElementById('view');
        document.getElementById('cats-bar').style.display = (name === 'home') ? 'flex' : 'none';
        
        if(name === 'home') fetchHome();
        else if(name === 'subs') renderSubs();
        else if(name === 'sets') renderSets();
        else v.innerHTML = '<p style="text-align:center; padding-top:40px;">検索結果がここに表示されます</p>';
    }

    async function fetchHome() {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`);
            const data = await res.json();
            render(data.items);
        } catch (e) { console.error("Home Load Error"); }
    }

    async function search() {
        const query = document.getElementById('q').value;
        if(!query) return;
        tab('search');
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=30&key=${API_KEY}`);
        const data = await res.json();
        render(data.items);
    }

    function render(items) {
        const v = document.getElementById('view');
        if(!items) { v.innerHTML = '<p style="text-align:center;">動画が読み込めませんでした（APIキーを確認してください）</p>'; return; }
        v.innerHTML = items.map(i => `
            <div class="v-card" onclick="openPlayer('${i.id.videoId || i.id}')">
                <img src="${i.snippet.thumbnails.high.url}" class="thumb">
                <div style="display:flex; gap:12px; margin-top:10px;">
                    <div style="width:36px; height:36px; border-radius:50%; background:#333; overflow:hidden;" onclick="event.stopPropagation(); openCh('${i.snippet.channelId}')">
                        <img src="https://ui-avatars.com/api/?name=${i.snippet.channelTitle}" style="width:100%">
                    </div>
                    <div>
                        <div style="font-weight:bold; font-size:14px; line-height:1.4;">${i.snippet.title}</div>
                        <div style="font-size:12px; color:gray;">${i.snippet.channelTitle}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderSubs() {
        document.getElementById('view').innerHTML = `
            <h3>登録済みチャンネル</h3>
            <div class="set-card" onclick="openCh('UCxxxxxxxx')">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div style="width:40px; height:40px; border-radius:50%; background:#444;"></div>
                    <div>サンプルチャンネル</div>
                </div>
                <span class="material-symbols-rounded">chevron_right</span>
            </div>
            <p style="font-size:12px; color:gray; text-align:center;">※タップで独自チャンネルUIを開きます</p>
        `;
    }

    function renderSets() {
        document.getElementById('view').innerHTML = `
            <h2>設定</h2>
            <div class="set-card"><div>ライトモード</div><div class="m3-switch" id="sw-light" onclick="toggleLight()"></div></div>
            <div class="set-card"><div>夜間モード</div><div class="m3-switch" onclick="this.classList.toggle('on')"></div></div>
            <div class="set-card"><div>アクセントカラー</div><input type="color" onchange="document.documentElement.style.setProperty('--accent', this.value)" value="#d0bcff"></div>
            <div class="set-card"><div>画質設定</div><select style="background:none; color:inherit; border:none;"><option>自動</option><option>2160p</option><option>1080p</option></select></div>
            
            <h3>更新履歴</h3>
            <div class="history-list">
                <b>V3.6.8:</b> Liquid Glassタブバー、M3スイッチ楕円化、ロゴ出し分け、設定項目拡充、API安定化。<br>
                <b>V3.6.1:</b> 外部アプリ起動バグ修正、0.1刻み履歴実装。<br>
                <b>V3.0.0:</b> Material 3 移行開始。独自プレイヤー。
            </div>
        `;
        if(document.body.classList.contains('light')) document.getElementById('sw-light').classList.add('on');
    }

    function toggleLight() {
        document.body.classList.toggle('light');
        document.getElementById('sw-light').classList.toggle('on');
    }

    function openPlayer(id) {
        // プレイヤー表示処理（前述のオーバーレイを使用）
        alert("動画ID: " + id + " を再生します。");
    }
</script>
</body>
</html>
