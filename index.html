<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root {
            --m3-surface: #1c1b1f;
            --m3-primary: #d0bcff;
            --accent-color: #d0bcff;
            --bg-color: #000000;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: 'Roboto', sans-serif; overflow: hidden;
        }

        /* 起動アニメーション */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-line {
            width: 2px; height: 0; background: white;
            animation: line-grow 1.5s ease-in-out forwards;
        }
        @keyframes line-grow {
            0% { height: 0; }
            50% { height: 100px; }
            100% { height: 0; opacity: 0; }
        }

        /* ヘッダー修正 (検索ボタンのはみ出し防止) */
        .header {
            position: fixed; top: 0; width: 100%; height: 56px;
            background: rgba(0,0,0,0.9); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 100; box-sizing: border-box;
        }
        .search-container {
            display: flex; flex: 1; margin: 0 15px; background: #222;
            border-radius: 20px; padding: 4px 12px; align-items: center;
        }
        .search-container input {
            background: none; border: none; color: white; flex: 1; outline: none;
        }

        /* カテゴリバー (クリック可能に修正) */
        .category-bar {
            position: fixed; top: 56px; width: 100%; overflow-x: auto;
            background: black; padding: 8px 12px; z-index: 99; display: flex; gap: 8px;
        }
        .category-item {
            background: #333; color: white; padding: 6px 16px;
            border-radius: 8px; border: none; cursor: pointer; transition: 0.3s;
        }
        .category-item.active { background: white; color: black; }

        /* グリッドレイアウト (タブレット向け3列) */
        .content-area {
            margin-top: 110px; height: calc(100vh - 190px);
            overflow-y: auto; padding: 12px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
        }

        /* 動画カード */
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:active { transform: scale(0.98); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; }
        .video-info { display: flex; gap: 10px; margin-top: 8px; }
        .ch-click-area { cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; background: #444; }

        /* 下部タブバー (新構成) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: var(--m3-surface); display: flex; z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #aaa;
        }
        .nav-item.active { color: var(--accent-color); }
        .nav-item .material-symbols-rounded { font-size: 28px; transition: 0.3s; }
        .nav-item:active .material-symbols-rounded { transform: scale(1.2); }

        /* プレイヤーオーバーレイ */
        #player-overlay {
            position: fixed; inset: 0; background: black; z-index: 500; display: none;
        }
        
        /* 設定パネル */
        #settings-panel {
            padding: 20px; display: none;
        }
        .setting-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-line"></div></div>

    <header class="header">
        <div class="logo">YangTube</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="検索...">
            <span class="material-symbols-rounded" onclick="searchVideos()">search</span>
        </div>
    </header>

    <div class="category-bar" id="categoryBar">
        <button class="category-item active" onclick="filterCategory('すべて', this)">すべて</button>
        <button class="category-item" onclick="filterCategory('ゲーム', this)">ゲーム</button>
        <button class="category-item" onclick="filterCategory('音楽', this)">音楽</button>
        <button class="category-item" onclick="filterCategory('Minecraft', this)">Minecraft</button>
    </div>

    <main class="content-area" id="home-page"></main>
    <main class="content-area" id="search-page" style="display:none;"></main>
    <main id="shorts-page" style="display:none; overflow-y: scroll; scroll-snap-type: y mandatory; height: 100vh;"></main>
    <main class="content-area" id="subs-page" style="display:none;">
        <div id="settings-icon" style="position:fixed; top:15px; right:15px; z-index:1000; cursor:pointer;">
            <span class="material-symbols-rounded" onclick="toggleSettings()">settings</span>
        </div>
        <div id="subs-content">登録したチャンネルがここに表示されます</div>
        <div id="settings-panel">
            <h3>設定</h3>
            <div class="setting-row">ダークモード <input type="checkbox" checked disabled></div>
            <div class="setting-row">アクセントカラー <input type="color" id="accentPicker" onchange="changeAccent(this.value)"></div>
        </div>
    </main>

    <div id="player-overlay">
        <span class="material-symbols-rounded" style="margin:10px; cursor:pointer;" onclick="closePlayer()">close</span>
        <div id="player-container"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
        <div class="nav-item" onclick="switchTab('search')"><span class="material-symbols-rounded">search</span><p>検索</p></div>
        <div class="nav-item create-btn" onclick="triggerUpload()"><span class="material-symbols-rounded">add_circle</span></div>
        <div class="nav-item" onclick="switchTab('shorts')"><span class="material-symbols-rounded">play_arrow</span><p>ショート</p></div>
        <div class="nav-item" onclick="switchTab('subs')"><span class="material-symbols-rounded">subscriptions</span><p>登録</p></div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo';

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 2000);
            loadVideos();
        };

        function switchTab(id) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id + '-page').style.display = (id === 'shorts') ? 'block' : 'grid';
            event.currentTarget.classList.add('active');
            if(id === 'shorts') loadShorts();
        }

        async function loadVideos(query = '') {
            const url = query 
                ? `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=30&key=${API_KEY}`
                : `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderVideos(data.items, query ? 'search-page' : 'home-page');
        }

        function renderVideos(items, targetId) {
            const target = document.getElementById(targetId);
            target.innerHTML = items.map(item => {
                const id = item.id.videoId || item.id;
                return `
                <div class="video-card">
                    <img class="thumbnail" src="${item.snippet.thumbnails.high.url}" onclick="openPlayer('${id}')">
                    <div class="video-info">
                        <div class="ch-click-area" onclick="openChannel('${item.snippet.channelId}')">
                            <div class="channel-icon"></div>
                            <div class="video-text">
                                <strong>${item.snippet.title}</strong>
                                <p>${item.snippet.channelTitle}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function searchVideos() {
            const q = document.getElementById('searchInput').value;
            switchTab('search');
            loadVideos(q);
        }

        function openPlayer(id) {
            document.getElementById('player-overlay').style.display = 'block';
            document.getElementById('player-container').innerHTML = `<iframe width="100%" height="300px" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        }

        function closePlayer() { document.getElementById('player-overlay').style.display = 'none'; document.getElementById('player-container').innerHTML = ''; }

        function openChannel(id) {
            alert("チャンネルページを表示します (ID: " + id + ")");
            // ここに前回のチャンネルオーバーレイ処理を統合
        }

        function changeAccent(color) {
            document.documentElement.style.setProperty('--accent-color', color);
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadVideos(cat === 'すべて' ? '' : cat);
        }
    </script>
</body>
</html>
