<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.6 Ultimate</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --m3-primary: #d0bcff;
            --m3-on-primary: #381e72;
            --bg-color: #000000;
            --surface: #1c1b1f;
            --text-color: #ffffff;
            --card-bg: #111111;
        }

        body.light-mode {
            --bg-color: #fef7ff;
            --surface: #f3edf7;
            --text-color: #1c1b1f;
            --m3-primary: #6750a4;
            --card-bg: #ffffff;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Roboto', sans-serif; overflow: hidden; transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        /* 起動アニメーション */
        #splash {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 5000;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-shape {
            width: 60px; height: 60px; background: var(--m3-primary); border-radius: 20px;
            animation: morph 1.5s infinite ease-in-out;
        }
        @keyframes morph {
            0% { border-radius: 20px; transform: scale(1); }
            50% { border-radius: 50%; transform: scale(1.5) rotate(90deg); }
            100% { border-radius: 20px; transform: scale(1) rotate(180deg); }
        }

        /* ヘッダー */
        .header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: var(--bg-color); display: flex; align-items: center; padding: 0 24px; z-index: 1000;
        }
        .search-bar {
            flex: 1; height: 48px; background: var(--surface); border-radius: 24px;
            display: flex; align-items: center; padding: 0 20px; border: 1px solid rgba(128,128,128,0.2);
        }
        .search-bar input { background: none; border: none; color: var(--text-color); flex: 1; outline: none; font-size: 16px; }

        /* カテゴリバー */
        .cat-row {
            position: fixed; top: 70px; width: 100%; height: 50px; background: var(--bg-color);
            display: flex; overflow-x: auto; padding: 0 20px; gap: 10px; align-items: center; z-index: 999;
        }
        .chip {
            padding: 8px 16px; background: var(--surface); border-radius: 8px; font-size: 14px;
            white-space: nowrap; cursor: pointer; border: none; color: var(--text-color);
        }
        .chip.active { background: var(--m3-primary); color: var(--m3-on-primary); }

        /* コンテンツ */
        .content {
            margin-top: 125px; height: calc(100vh - 225px); overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 0 20px;
        }

        /* ビデオカード */
        .v-card { cursor: pointer; background: var(--card-bg); border-radius: 16px; overflow: hidden; padding-bottom: 12px; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-meta { display: flex; gap: 12px; padding: 12px; }
        .ch-icon { width: 40px; height: 40px; border-radius: 50%; background: #444; overflow: hidden; }

        /* 独自チャンネルUI */
        #channel-ui {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; display: none; overflow-y: auto;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* フローティングタブバー */
        .nav-bar {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            height: 80px; background: var(--surface); border-radius: 40px;
            display: flex; align-items: center; padding: 0 20px; gap: 10px; z-index: 3000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { width: 80px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: var(--text-color); }
        .nav-item .material-symbols-rounded { font-size: 28px; transition: 0.2s; }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; color: var(--m3-primary); }
        .nav-item p { font-size: 11px; margin: 4px 0 0; }

        .fab { width: 64px; height: 64px; background: var(--m3-primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; }

        /* プレイヤー */
        #player { position: fixed; inset: 0; background: black; z-index: 4000; display: none; flex-direction: column; }

        /* 夜間モード */
        #night-filter { position: fixed; inset: 0; background: rgba(255,100,0,0.15); pointer-events: none; z-index: 10000; display: none; }

        .history-box { font-size: 13px; line-height: 1.6; background: var(--surface); padding: 15px; border-radius: 12px; height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="night-filter"></div>
    <div id="splash"><div class="splash-shape"></div></div>

    <header class="header">
        <div class="search-bar">
            <input type="text" id="q" placeholder="YouTubeを検索" onkeypress="if(event.key==='Enter') search()">
            <span class="material-symbols-rounded" onclick="search()">search</span>
        </div>
    </header>

    <div class="cat-row" id="cats">
        <button class="chip active" onclick="cat('すべて', this)">すべて</button>
        <button class="chip" onclick="cat('Minecraft', this)">Minecraft</button>
        <button class="chip" onclick="cat('ガジェット', this)">ガジェット</button>
        <button class="chip" onclick="cat('音楽', this)">音楽</button>
    </div>

    <main class="content" id="view"></main>

    <div id="channel-ui"></div>
    <div id="player"></div>

    <nav class="nav-bar">
        <div class="nav-item active" id="tab-home" onclick="go('home')"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
        <div class="nav-item" id="tab-search" onclick="go('search')"><span class="material-symbols-rounded">search</span><p>検索</p></div>
        <div class="fab" onclick="document.getElementById('f').click()"><span class="material-symbols-rounded" style="color:var(--m3-on-primary)">add</span></div>
        <div class="nav-item" id="tab-subs" onclick="go('subs')"><span class="material-symbols-rounded">subscriptions</span><p>登録済み</p></div>
        <div class="nav-item" id="tab-sets" onclick="go('sets')"><span class="material-symbols-rounded">settings</span><p>設定</p></div>
    </nav>

    <input type="file" id="f" hidden accept="video/*" onchange="localPlay(this)">

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo'; // ここにキーを！
        let subs = JSON.parse(localStorage.getItem('yang_subs') || '[]');

        window.onload = () => {
            setTimeout(() => document.getElementById('splash').style.display='none', 1500);
            load('home');
        };

        function go(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.getElementById('cats').style.display = (tab === 'home') ? 'flex' : 'none';
            document.getElementById('view').style.marginTop = (tab === 'home') ? '125px' : '80px';
            load(tab);
        }

        async function load(tab) {
            const v = document.getElementById('view');
            if(tab === 'home') fetchYT(`videos?part=snippet&chart=mostPopular&regionCode=JP&maxResults=40`);
            else if(tab === 'search') v.innerHTML = '<p style="text-align:center; width:100%;">キーワードを入力してください</p>';
            else if(tab === 'subs') renderSubs();
            else if(tab === 'sets') renderSets();
        }

        async function fetchYT(path) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${API_KEY}`);
            const data = await res.json();
            renderList(data.items);
        }

        function renderList(items) {
            const v = document.getElementById('view');
            v.innerHTML = items.map(i => {
                const id = i.id.videoId || i.id;
                const s = i.snippet;
                return `
                <div class="v-card" onclick="play('${id}')">
                    <img src="${s.thumbnails.high.url}">
                    <div class="v-meta">
                        <div class="ch-icon" onclick="event.stopPropagation(); openCh('${s.channelId}')">
                            <img src="https://ui-avatars.com/api/?name=${s.channelTitle}" style="width:100%">
                        </div>
                        <div>
                            <strong style="display:block;font-size:14px;">${s.title}</strong>
                            <small style="color:gray">${s.channelTitle}</small>
                        </div>
                    </div>
                </div>`;
            }).join('');
            // アイコン取得の遅延処理
            items.forEach(i => fetchIcon(i.snippet.channelId));
        }

        async function fetchIcon(cid) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${cid}&key=${API_KEY}`);
            const data = await res.json();
            const icon = data.items[0].snippet.thumbnails.default.url;
            document.querySelectorAll(`img[src*="${cid}"]`).forEach(img => img.src = icon);
        }

        function play(id) {
            const p = document.getElementById('player');
            p.style.display = 'flex';
            p.innerHTML = `
                <div style="padding:20px" onclick="this.parentElement.style.display='none'"><span class="material-symbols-rounded">close</span> 閉じる</div>
                <iframe src="https://www.youtube.com/embed/${id}?autoplay=1" style="width:100%; aspect-ratio:16/9; border:none;" allowfullscreen></iframe>
            `;
        }

        function openCh(cid) {
            const ui = document.getElementById('channel-ui');
            ui.style.display = 'block';
            ui.innerHTML = `<div style="padding:20px" onclick="this.parentElement.style.display='none'"><span class="material-symbols-rounded">arrow_back</span> 戻る</div>
                            <div id="ch-content" class="content" style="margin-top:0"></div>`;
            fetchCHVideos(cid);
        }

        async function fetchCHVideos(cid) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${cid}&maxResults=20&type=video&order=date&key=${API_KEY}`);
            const data = await res.json();
            const v = document.getElementById('ch-content');
            v.innerHTML = data.items.map(i => `<div class="v-card" onclick="play('${i.id.videoId}')"><img src="${i.snippet.thumbnails.high.url}"><p style="padding:10px">${i.snippet.title}</p></div>`).join('');
        }

        function renderSets() {
            document.getElementById('view').innerHTML = `
                <h2>設定</h2>
                <div class="v-card" style="padding:20px; margin-bottom:10px;">
                    <p>テーマモード</p>
                    <button onclick="document.body.classList.remove('light-mode')">ダーク</button>
                    <button onclick="document.body.classList.add('light-mode')">ライト</button>
                </div>
                <div class="v-card" style="padding:20px; margin-bottom:10px;">
                    <p>夜間モード</p>
                    <button onclick="document.getElementById('night-filter').style.display='block'">ON</button>
                    <button onclick="document.getElementById('night-filter').style.display='none'">OFF</button>
                </div>
                <h3>更新履歴 (V1.0 - V3.6)</h3>
                <div class="history-box">
                    <strong>V3.6:</strong> アイコン塗りつぶし実装、再生ロジック修正、全履歴追加、Materialモーフィング起動、独自UIバグ修正<br>
                    <strong>V3.5:</strong> 高画質化プロトコル、一部UIの不具合修正、メモリ最適化<br>
                    <strong>V3.4:</strong> フローティングタブバー導入、夜間フィルタ追加、余白最適化、日本向けおすすめ強化<br>
                    <strong>V3.3:</strong> 検索サジェスト、独自チャンネルページ(人気/新着順)、ファイルプレビュー<br>
                    <strong>V3.0:</strong> Material 3 完全移行、カラーパレット、アニメーション強化<br>
                    <strong>V2.6.1:</strong> Firebase連携の安定化、APIクォータ節約モード<br>
                    <strong>V2.0:</strong> YouTube Data API v3 初代連携、検索機能実装<br>
                    <strong>V1.5:</strong> ローカル再生、複数タブの試作<br>
                    <strong>V1.0:</strong> YangTube 誕生。シンプルなWebプレイヤーとして公開
                </div>
            `;
        }

        function search() {
            const q = document.getElementById('q').value;
            fetchYT(`search?part=snippet&q=${q}&type=video&maxResults=50&regionCode=JP`);
        }

        function localPlay(input) {
            const file = input.files[0];
            const url = URL.createObjectURL(file);
            const p = document.getElementById('player');
            p.style.display = 'flex';
            p.innerHTML = `<div style="padding:20px" onclick="this.parentElement.style.display='none'"><span class="material-symbols-rounded">close</span> 閉じる</div>
                           <video src="${url}" controls style="width:100%"></video>`;
        }
    </script>
</body>
</html>
