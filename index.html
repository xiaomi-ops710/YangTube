<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YangTube Pro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --md-surface: #0f0f0f; --md-on-surface: #ffffff; --md-secondary: #272727; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background-color: var(--md-surface); color: var(--md-on-surface); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ヘッダー */
        header { padding: 10px 16px; background: var(--md-surface); display: flex; flex-direction: column; gap: 12px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; color: #ff0000; display: flex; align-items: center; gap: 4px; }
        
        .search-container { display: flex; gap: 8px; align-items: center; background: var(--md-secondary); padding: 8px 16px; border-radius: 24px; }
        .search-container input { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; outline: none; }

        /* カテゴリタブ */
        .categories { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 10px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .category-chip { background: var(--md-secondary); padding: 6px 12px; border-radius: 8px; font-size: 14px; white-space: nowrap; cursor: pointer; border: none; color: #fff; }
        .category-chip.active { background: #fff; color: #000; }

        /* 動画リスト（Material 3タイル） */
        main { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; padding: 10px; }
        .video-card { cursor: pointer; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #333; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-details { display: flex; gap: 12px; padding: 12px 4px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; background: #444; flex-shrink: 0; overflow: hidden; }
        .channel-icon img { width: 100%; height: 100%; }
        .text-details { flex: 1; }
        .text-details h3 { margin: 0; font-size: 16px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .text-details p { margin: 4px 0 0; font-size: 12px; color: #aaa; }

        /* プレイヤー（独立レイアウト） */
        #player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .player-header { padding: 10px; display: flex; align-items: center; }
        .video-frame-container { width: 100%; aspect-ratio: 16/9; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ボトムナビ */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--md-surface); border-top: 1px solid var(--md-secondary); display: flex; justify-content: space-around; padding: 8px 0 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 10px; cursor: pointer; opacity: 0.7; }
        .nav-item.active { opacity: 1; }
        .nav-item .material-icons { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header id="app-header">
        <div class="top-row">
            <div class="logo"><span class="material-icons">play_circle_filled</span>YangTube</div>
            <span class="material-icons">notifications_none</span>
        </div>
        <div class="search-container">
            <span class="material-icons">search</span>
            <input type="text" id="search-input" placeholder="YouTubeを検索">
        </div>
    </header>

    <div class="categories">
        <button class="category-chip active" onclick="loadHome()">すべて</button>
        <button class="category-chip" onclick="search('マイクラ')">マイクラ</button>
        <button class="category-chip" onclick="search('にゃんこ大戦争')">にゃんこ大戦争</button>
        <button class="category-chip" onclick="search('音楽')">音楽</button>
        <button class="category-chip" onclick="search('ゲーム実況')">ゲーム</button>
    </div>

    <main id="content">
        <div class="video-grid" id="video-grid"></div>
    </main>

    <!-- 再生画面オーバーレイ -->
    <div id="player-overlay">
        <div class="player-header">
            <span class="material-icons" onclick="closePlayer()" style="font-size: 30px; cursor: pointer;">expand_more</span>
        </div>
        <div class="video-frame-container"></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="loadHome()"><span class="material-icons">home</span>ホーム</div>
        <div class="nav-item"><span class="material-icons">bolt</span>ショート</div>
        <div class="nav-item"><span class="material-icons">subscriptions</span>登録チャンネル</div>
        <div class="nav-item"><span class="material-icons">account_circle</span>マイページ</div>
    </nav>

    <script>
        // ★ここにあなたのAPIキーを貼り付け★
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo';

        const grid = document.getElementById('video-grid');
        const input = document.getElementById('search-input');
        const overlay = document.getElementById('player-overlay');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { search(input.value); input.blur(); }
        });

        // ホーム：トレンド動画を取得
        async function loadHome() {
            const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`;
            fetchAndRender(url);
        }

        async function search(q) {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&maxResults=30&type=video&key=${API_KEY}`;
            fetchAndRender(url);
        }

        async function fetchAndRender(url) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                render(data.items);
            } catch (e) { alert('APIエラーが発生しました'); }
        }

        function render(items) {
            grid.innerHTML = '';
            items.forEach(item => {
                const id = item.id.videoId || item.id;
                const s = item.snippet;
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(id);
                card.innerHTML = `
                    <div class="thumb-container">
                        <img src="${s.thumbnails.high.url}" loading="lazy">
                    </div>
                    <div class="video-details">
                        <div class="channel-icon">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(s.channelTitle)}&background=random" alt="">
                        </div>
                        <div class="text-details">
                            <h3>${s.title}</h3>
                            <p>${s.channelTitle} • ${s.publishedAt.split('T')[0]}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playVideo(id) {
            overlay.style.display = 'block';
            overlay.querySelector('.video-frame-container').innerHTML = 
                `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            overlay.style.display = 'none';
            overlay.querySelector('.video-frame-container').innerHTML = '';
        }

        // 起動時にホームを読み込む
        loadHome();
    </script>
</body>
</html>
