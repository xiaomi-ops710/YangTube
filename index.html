<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube</title>
    <!-- Google Material Symbols Rounded -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root {
            --m3-surface: #1c1b1f;
            --m3-on-surface: #e6e1e5;
            --m3-primary: #d0bcff;
            --m3-secondary-container: #4a4458;
            --m3-on-secondary-container: #e8def8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* ヘッダー */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 56px;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
        }

        .logo { font-size: 20px; font-weight: bold; color: white; display: flex; align-items: center; gap: 4px; }
        .logo span { color: #FF0000; font-size: 30px; }

        /* カテゴリバー */
        .category-bar {
            position: fixed;
            top: 56px;
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            background: black;
            padding: 8px 0;
            z-index: 99;
            display: flex;
            gap: 8px;
            padding-left: 12px;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .category-item {
            background: var(--m3-secondary-container);
            color: var(--m3-on-secondary-container);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            border: none;
        }
        .category-item.active { background: white; color: black; }

        /* メインコンテンツエリア */
        .content-area {
            margin-top: 110px;
            height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 0 12px;
        }

        /* ショート画面 (スナップスクロール) */
        #shorts-page {
            display: none;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .short-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 下部タブバー */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: var(--m3-surface);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 0.5px solid #333;
            padding-bottom: 10px;
        }
        .nav-item {
            text-align: center;
            color: #aaa;
            font-size: 10px;
            flex: 1;
            cursor: pointer;
        }
        .nav-item.active { color: white; }
        .nav-item .material-symbols-rounded { font-size: 28px; margin-bottom: 4px; }
        .create-btn .material-symbols-rounded { font-size: 45px; color: white; }

        /* 動画カード */
        .video-card { margin-bottom: 20px; }
        .thumbnail { width: 100%; border-radius: 12px; aspect-ratio: 16/9; background: #333; object-fit: cover; }
        .video-info { display: flex; gap: 12px; margin-top: 10px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; background: #444; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .video-text h3 { margin: 0; font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-text p { margin: 4px 0 0; font-size: 12px; color: #aaa; }

        /* 独自UIチャンネルオーバーレイ */
        #channel-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200; display: none;
            overflow-y: auto;
        }

        /* 広告ぼかし用 */
        .ad-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(30px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><span class="material-symbols-rounded">play_circle</span> YangTube</div>
        <div class="header-icons">
            <span class="material-symbols-rounded">search</span>
        </div>
    </header>

    <div class="category-bar" id="categoryBar">
        <button class="category-item active">すべて</button>
        <button class="category-item">音楽</button>
        <button class="category-item">ゲーム</button>
        <button class="category-item">ニュース</button>
        <button class="category-item">ミックス</button>
        <button class="category-item">ライブ</button>
        <button class="category-item">最近アップロードされた動画</button>
    </div>

    <!-- ホーム画面 -->
    <main class="content-area" id="home-page">
        <div id="video-grid"></div>
    </main>

    <!-- ショート画面 -->
    <main id="shorts-page"></main>

    <!-- マイページ/設定画面 -->
    <main class="content-area" id="mypage-page" style="display:none;">
        <h2>マイページ</h2>
        <div class="category-item" style="display:inline-block; margin-bottom:20px;">設定 (ダークモード・アクセントカラー)</div>
        <p>視聴履歴: 15時間</p>
    </main>

    <!-- チャンネルUIオーバーレイ -->
    <div id="channel-overlay">
        <div style="padding: 16px;">
            <span class="material-symbols-rounded" onclick="closeChannel()">arrow_back</span>
            <div id="channel-content"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <span class="material-symbols-rounded">home</span>
            <p>ホーム</p>
        </div>
        <div class="nav-item" onclick="switchTab('shorts')">
            <span class="material-symbols-rounded">play_arrow</span>
            <p>ショート</p>
        </div>
        <div class="nav-item create-btn" onclick="triggerUpload()">
            <span class="material-symbols-rounded">add_circle</span>
        </div>
        <div class="nav-item" onclick="switchTab('subscriptions')">
            <span class="material-symbols-rounded">subscriptions</span>
            <p>登録チャンネル</p>
        </div>
        <div class="nav-item" onclick="switchTab('mypage')">
            <span class="material-symbols-rounded">person</span>
            <p>マイページ</p>
        </div>
    </nav>

    <input type="file" id="videoUploader" style="display:none" accept="video/*">

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo'; // ここに取得したAPIキーを入れてね！

        // タブ切り替えロジック
        function switchTab(tabId) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if(tabId === 'home') {
                document.getElementById('home-page').style.display = 'block';
                document.getElementById('categoryBar').style.display = 'flex';
            } else if(tabId === 'shorts') {
                document.getElementById('shorts-page').style.display = 'block';
                document.getElementById('categoryBar').style.display = 'none';
                loadShorts();
            } else {
                document.getElementById(tabId + '-page').style.display = 'block';
            }
            event.currentTarget.classList.add('active');
        }

        // 動画読み込み (レコメンド増量版)
        async function loadVideos() {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&maxResults=50&regionCode=JP&key=${API_KEY}`);
            const data = await res.json();
            const grid = document.getElementById('video-grid');
            grid.innerHTML = data.items.map(item => `
                <div class="video-card" onclick="openInternalChannel('${item.snippet.channelId}')">
                    <img class="thumbnail" src="${item.snippet.thumbnails.medium.url}">
                    <div class="video-info">
                        <div class="channel-icon">${item.snippet.channelTitle[0]}</div>
                        <div class="video-text">
                            <h3>${item.snippet.title}</h3>
                            <p>${item.snippet.channelTitle} ・ ${parseInt(item.statistics.viewCount).toLocaleString()}回視聴</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ショート動画読み込み (縦スワイプUI)
        async function loadShorts() {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoDuration=short&maxResults=10&key=${API_KEY}`);
            const data = await res.json();
            const shortsPage = document.getElementById('shorts-page');
            shortsPage.innerHTML = data.items.map(item => `
                <div class="short-video">
                    <iframe width="100%" height="90%" src="https://www.youtube.com/embed/${item.id.videoId}?autoplay=1&controls=0&loop=1" frameborder="0"></iframe>
                </div>
            `).join('');
        }

        // ローカル動画アップロード再生
        function triggerUpload() {
            document.getElementById('videoUploader').click();
        }

        document.getElementById('videoUploader').onchange = e => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const grid = document.getElementById('video-grid');
            grid.innerHTML = `<h3>アップロードした動画を再生中: ${file.name}</h3><video src="${url}" controls width="100%" autoplay></video><hr>` + grid.innerHTML;
            switchTab('home');
        };

        // 独自チャンネルUI表示
        async function openInternalChannel(channelId) {
            document.getElementById('channel-overlay').style.display = 'block';
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${API_KEY}`);
            const data = await res.json();
            const ch = data.items[0];
            document.getElementById('channel-content').innerHTML = `
                <div style="text-align:center; padding-top:20px;">
                    <img src="${ch.snippet.thumbnails.medium.url}" style="border-radius:50%; width:100px;">
                    <h2>${ch.snippet.title}</h2>
                    <p>${ch.statistics.subscriberCount} チャンネル登録者</p>
                    <div class="category-item" style="display:inline-block">チャンネル登録</div>
                </div>
            `;
        }

        function closeChannel() {
            document.getElementById('channel-overlay').style.display = 'none';
        }

        // 初期ロード
        loadVideos();
    </script>
</body>
</html>
