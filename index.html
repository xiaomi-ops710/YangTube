<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.1</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root {
            --m3-surface: #1c1b1f;
            --m3-primary: #d0bcff;
            --accent-color: #d0bcff;
            --bg-color: #000000;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: 'Roboto', sans-serif; overflow: hidden;
        }

        /* 動的起動アニメーション */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-logo {
            width: 80px; height: 80px; background: white; border-radius: 24px;
            animation: splash-anim 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes splash-anim {
            0% { transform: scale(0) rotate(-45deg); border-radius: 50px; }
            50% { transform: scale(1.2) rotate(0deg); border-radius: 20px; }
            100% { transform: scale(10); opacity: 0; }
        }

        /* 巨大検索バー */
        .header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.95); display: flex;
            align-items: center; padding: 0 24px; z-index: 100; box-sizing: border-box;
        }
        .search-container {
            display: flex; flex: 1; height: 48px; background: #222;
            border-radius: 24px; padding: 0 20px; align-items: center;
            border: 1px solid #444; transition: border 0.3s;
        }
        .search-container:focus-within { border-color: var(--m3-primary); background: #2a2a2a; }
        .search-container input {
            background: none; border: none; color: white; flex: 1; outline: none; font-size: 18px;
        }

        /* カテゴリバー (動的動作用) */
        .category-bar {
            position: fixed; top: 70px; width: 100%; overflow-x: auto;
            background: black; padding: 12px; z-index: 99; display: flex; gap: 12px;
        }
        .category-item {
            background: #222; color: white; padding: 8px 20px;
            border-radius: 12px; border: none; cursor: pointer; font-weight: 500;
            transition: all 0.2s; white-space: nowrap;
        }
        .category-item.active { background: white; color: black; transform: scale(1.05); }

        /* コンテンツエリア (3列グリッド) */
        .content-area {
            margin-top: 140px; height: calc(100vh - 230px);
            overflow-y: auto; padding: 0 24px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
        }

        /* 動画カード */
        .video-card { cursor: pointer; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 16px; object-fit: cover; background: #222; }
        .video-info { display: flex; gap: 12px; margin-top: 12px; }
        .channel-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; overflow: hidden; flex-shrink: 0; }
        .channel-icon img { width: 100%; height: 100%; object-fit: cover; }
        .video-text strong { display: block; font-size: 15px; margin-bottom: 4px; line-height: 1.3; }
        .video-text p { font-size: 13px; color: #aaa; margin: 0; }

        /* 中央寄せ新タブバー */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: #111; display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 12px; z-index: 100;
        }
        .nav-container { display: flex; gap: 20px; align-items: center; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #888; width: 80px; transition: 0.3s; cursor: pointer;
        }
        .nav-item.active { color: white; }
        .nav-item p { font-size: 10px; margin: 4px 0 0; }
        .nav-item .material-symbols-rounded { font-size: 26px; }
        .create-btn-main {
            width: 64px; height: 64px; background: #2a2a2a; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; border: 1px solid #444; transition: 0.3s;
        }
        .create-btn-main:active { transform: scale(0.9); background: #333; }
        .create-btn-main .material-symbols-rounded { font-size: 36px; color: white; }

        /* フル画面プレイヤー */
        #player-overlay {
            position: fixed; inset: 0; background: black; z-index: 500; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .close-btn { position: absolute; top: 20px; left: 20px; z-index: 600; cursor: pointer; }
        .iframe-container { width: 100%; max-width: 1280px; aspect-ratio: 16/9; }

        /* 独自UIチャンネルオーバーレイ */
        #channel-overlay {
            position: fixed; inset: 0; background: #000; z-index: 700; display: none;
            padding: 40px; overflow-y: auto;
        }

        /* Material 3 Expressive Switch */
        .m3-switch {
            width: 52px; height: 32px; background: #444; border-radius: 16px;
            position: relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .m3-switch.on { background: var(--m3-primary); }
        .m3-switch-thumb {
            width: 24px; height: 24px; background: white; border-radius: 12px;
            position: absolute; top: 4px; left: 4px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .m3-switch.on .m3-switch-thumb { left: 24px; width: 26px; background: #381e72; }

    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-logo"></div></div>

    <header class="header">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="検索ワードを入力..." onkeypress="if(event.key==='Enter') searchVideos()">
            <span class="material-symbols-rounded" style="cursor:pointer; font-size:30px;" onclick="searchVideos()">search</span>
        </div>
    </header>

    <div class="category-bar" id="categoryBar">
        <button class="category-item active" onclick="filterCategory('すべて', this)">すべて</button>
        <button class="category-item" onclick="filterCategory('音楽', this)">音楽</button>
        <button class="category-item" onclick="filterCategory('ゲーム', this)">ゲーム</button>
        <button class="category-item" onclick="filterCategory('ニュース', this)">ニュース</button>
        <button class="category-item" onclick="filterCategory('Minecraft', this)">Minecraft</button>
        <button class="category-item" onclick="filterCategory('ライブ', this)">ライブ</button>
    </div>

    <main class="content-area" id="home-page"></main>
    <main class="content-area" id="search-page" style="display:none;"></main>
    <main class="content-area" id="subs-page" style="display:none;"><h2>登録チャンネル</h2><p>まだ登録されていません。</p></main>
    <main class="content-area" id="settings-page" style="display:none;">
        <h2>設定</h2>
        <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0;">
            <span>ダークモード (Material 3)</span>
            <div class="m3-switch on" onclick="this.classList.toggle('on')"><div class="m3-switch-thumb"></div></div>
        </div>
        <p>アクセントカラー: <input type="color" onchange="document.documentElement.style.setProperty('--m3-primary', this.value)"></p>
    </main>

    <div id="player-overlay">
        <span class="material-symbols-rounded close-btn" onclick="closePlayer()">arrow_back_ios</span>
        <div class="iframe-container" id="player-container"></div>
    </div>

    <div id="channel-overlay">
        <span class="material-symbols-rounded" onclick="this.parentElement.style.display='none'" style="cursor:pointer">close</span>
        <div id="channel-details"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" onclick="switchTab('home', this)"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
            <div class="nav-item" onclick="switchTab('search', this)"><span class="material-symbols-rounded">search</span><p>検索</p></div>
            <div class="create-btn-main" onclick="triggerUpload()"><span class="material-symbols-rounded">add</span></div>
            <div class="nav-item" onclick="switchTab('subs', this)"><span class="material-symbols-rounded">subscriptions</span><p>登録チャンネル</p></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><span class="material-symbols-rounded">settings</span><p>設定</p></div>
        </div>
    </nav>

    <input type="file" id="videoUploader" style="display:none" accept="video/*">

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UХBbqHHhI7iVSZMnjyTdo'; // ここにAPIキーを！

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 2000);
            loadVideos();
        };

        function switchTab(id, el) {
            document.querySelectorAll('main').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id + '-page').style.display = 'grid';
            el.classList.add('active');
        }

        async function loadVideos(query = '', categoryId = '') {
            let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`;
            if (query) url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&type=video&maxResults=30&key=${API_KEY}`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderVideos(data.items, query ? 'search-page' : 'home-page');
        }

        function renderVideos(items, targetId) {
            const target = document.getElementById(targetId);
            target.innerHTML = items.map(item => {
                const id = item.id.videoId || item.id;
                const snip = item.snippet;
                return `
                <div class="video-card">
                    <img class="thumbnail" src="${snip.thumbnails.high.url}" onclick="openPlayer('${id}')">
                    <div class="video-info">
                        <div class="channel-icon" onclick="openChannel('${snip.channelId}')">
                            <img src="https://ui-avatars.com/api/?name=${snip.channelTitle}&background=random">
                        </div>
                        <div class="video-text">
                            <strong onclick="openPlayer('${id}')">${snip.title}</strong>
                            <p onclick="openChannel('${snip.channelId}')">${snip.channelTitle}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function searchVideos() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            switchTab('search', document.querySelectorAll('.nav-item')[1]);
            loadVideos(q);
        }

        function openPlayer(id) {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('player-container').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        }

        function closePlayer() { 
            document.getElementById('player-overlay').style.display = 'none'; 
            document.getElementById('player-container').innerHTML = ''; 
        }

        async function openChannel(channelId) {
            const overlay = document.getElementById('channel-overlay');
            overlay.style.display = 'block';
            const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${channelId}&key=${API_KEY}`);
            const data = await res.json();
            const ch = data.items[0];
            document.getElementById('channel-details').innerHTML = `
                <div style="text-align:center;">
                    <img src="${ch.snippet.thumbnails.medium.url}" style="border-radius:50%; width:120px;">
                    <h1>${ch.snippet.title}</h1>
                    <p>${parseInt(ch.statistics.subscriberCount).toLocaleString()} 登録者</p>
                    <button class="category-item active">チャンネル登録</button>
                </div>
            `;
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadVideos(cat === 'すべて' ? '' : cat);
        }

        function triggerUpload() { document.getElementById('videoUploader').click(); }
    </script>
</body>
</html>
