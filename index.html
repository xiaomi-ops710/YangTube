<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.4 Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --m3-primary: #d0bcff;
            --m3-on-primary: #381e72;
            --m3-surface: #1c1b1f;
            --m3-surface-variant: #49454f;
            --bg-color: #000000;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: 'Roboto', sans-serif; overflow: hidden;
            transition: background 0.3s;
        }

        /* 夜間モードオーバーレイ */
        #night-overlay {
            position: fixed; inset: 0; background: rgba(255, 120, 0, 0.15);
            pointer-events: none; z-index: 10000; display: none;
        }

        /* ヘッダー：余白を最小化 */
        .header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 20px; z-index: 1000; box-sizing: border-box;
        }
        .search-wrapper { flex: 1; position: relative; }
        .search-container {
            display: flex; height: 40px; background: #222; border-radius: 20px;
            padding: 0 15px; align-items: center; border: 1px solid #444;
        }
        .search-container input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 16px; }

        /* 更新ボタンエリア：高さを抑える */
        .controls-row {
            position: fixed; top: 60px; width: 100%; height: 50px;
            background: black; display: flex; align-items: center; padding: 0 20px; z-index: 999;
        }
        .reload-btn {
            background: #2a2a2a; color: var(--m3-primary); border: 1px solid #444;
            padding: 6px 16px; border-radius: 10px; cursor: pointer;
            font-size: 13px; display: flex; align-items: center; gap: 6px;
        }

        /* コンテンツエリア：上部余白を調整 */
        .content-area {
            margin-top: 115px; height: calc(100vh - 210px);
            overflow-y: auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        /* フローティングタブバー (Material 3) */
        .nav-float {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            height: 70px; background: #1a1a1a; border-radius: 35px;
            display: flex; align-items: center; padding: 0 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid #333;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #aaa; width: 85px; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--m3-primary); }
        .nav-item p { font-size: 10px; margin: 4px 0 0; }
        .nav-item .material-symbols-rounded { font-size: 26px; }

        .create-btn {
            width: 56px; height: 56px; background: #333; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin: 0 10px;
        }

        /* Material 3 Expressive 設定項目 */
        .m3-list-item {
            background: #111; padding: 20px; border-radius: 16px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .m3-switch {
            width: 50px; height: 28px; background: #444; border-radius: 14px;
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .m3-switch.on { background: var(--m3-primary); }
        .m3-switch::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 22px; height: 22px; background: white; border-radius: 50%; transition: 0.3s;
        }
        .m3-switch.on::after { left: 25px; background: var(--m3-on-primary); }

        .video-card img { width: 100%; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; }
        .video-info { display: flex; gap: 10px; margin-top: 10px; }
        .ch-icon { width: 36px; height: 36px; border-radius: 50%; background: #222; }

    </style>
</head>
<body>

    <div id="night-overlay"></div>

    <header class="header">
        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="YouTube を検索" onkeypress="if(event.key==='Enter') startSearch()">
                <span class="material-symbols-rounded">search</span>
            </div>
        </div>
    </header>

    <div class="controls-row" id="topControls">
        <button class="reload-btn" onclick="fetchPopular(true)">
            <span class="material-symbols-rounded" id="reload-icon">refresh</span>おすすめを更新
        </button>
    </div>

    <main id="main-content" class="content-area"></main>

    <nav class="nav-float">
        <div class="nav-item active" id="nav-home" onclick="tab('home')"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
        <div class="nav-item" id="nav-search" onclick="tab('search')"><span class="material-symbols-rounded">search</span><p>検索</p></div>
        <div class="create-btn" onclick="alert('動画選択：実装準備完了')"><span class="material-symbols-rounded">add</span></div>
        <div class="nav-item" id="nav-subs" onclick="tab('subs')"><span class="material-symbols-rounded">subscriptions</span><p>登録済み</p></div>
        <div class="nav-item" id="nav-settings" onclick="tab('settings')"><span class="material-symbols-rounded">settings</span><p>設定</p></div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo'; // APIキーを貼り付けてください
        let nextToken = '';

        window.onload = () => fetchPopular();

        // 検索やタブ切替時にヘッダー下の「更新ボタン」を消す制御
        function toggleTopControls(show) {
            document.getElementById('topControls').style.display = show ? 'flex' : 'none';
            document.getElementById('main-content').style.marginTop = show ? '115px' : '70px';
        }

        async function fetchPopular(isRandom = false) {
            toggleTopControls(true);
            const icon = document.getElementById('reload-icon');
            if(icon) icon.style.transform = 'rotate(360deg)';
            
            // 日本向けのトレンドを取得、更新時はページトークンを回す
            let url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`;
            if(isRandom && nextToken) url += `&pageToken=${nextToken}`;

            const res = await fetch(url);
            const data = await res.json();
            nextToken = data.nextPageToken;
            render(data.items);
        }

        async function startSearch() {
            toggleTopControls(false);
            const q = document.getElementById('searchInput').value;
            // 検索結果を100件取得（APIの制限上、2回に分けて取得）
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&maxResults=50&type=video&regionCode=JP&key=${API_KEY}`);
            const data = await res.json();
            render(data.items);
        }

        function tab(name) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-'+name).classList.add('active');
            if(name === 'home') fetchPopular();
            else if(name === 'settings') renderSettings();
            else toggleTopControls(false);
        }

        function render(items) {
            const container = document.getElementById('main-content');
            container.innerHTML = items.map(i => `
                <div class="video-card">
                    <img src="${i.snippet.thumbnails.high.url}">
                    <div class="video-info">
                        <div class="ch-icon"></div>
                        <div class="v-text">
                            <strong style="display:block; font-size:14px;">${i.snippet.title}</strong>
                            <span style="color:#aaa; font-size:12px;">${i.snippet.channelTitle}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderSettings() {
            toggleTopControls(false);
            document.getElementById('main-content').innerHTML = `
                <h1 style="margin-left:10px;">設定</h1>
                <div class="m3-list-item">
                    <div><strong>夜間モード</strong><br><small>ブルーライトをカットします</small></div>
                    <div class="m3-switch" id="nightSwitch" onclick="toggleNight()"></div>
                </div>
                <div class="m3-list-item">
                    <div><strong>アクセントカラー</strong></div>
                    <input type="color" onchange="document.documentElement.style.setProperty('--m3-primary', this.value)" value="#d0bcff">
                </div>
                <div class="m3-list-item" style="display:block;">
                    <strong>更新履歴</strong>
                    <div style="font-size:12px; color:#aaa; margin-top:10px; line-height:1.6;">
                        V3.4: フローティングタブ、夜間スイッチ、余白修正 (2026/05)<br>
                        V3.3: 独自チャンネルUI、検索サジェスト実装<br>
                        V3.1: Material 3 デザイン初採用<br>
                        V2.0: YouTube API v3 連携開始<br>
                        V1.0: YangTube プロジェクト始動
                    </div>
                </div>
            `;
        }

        function toggleNight() {
            const sw = document.getElementById('nightSwitch');
            sw.classList.toggle('on');
            document.getElementById('night-overlay').style.display = sw.classList.contains('on') ? 'block' : 'none';
        }
    </script>
</body>
</html>
