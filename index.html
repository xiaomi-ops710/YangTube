<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.1 Gold</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --m3-surface: #1c1b1f;
            --m3-primary: #d0bcff;
            --m3-on-primary: #381e72;
            --bg-color: #000000;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: white;
            font-family: 'Roboto', sans-serif; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 起動アニメーション */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-logo {
            width: 80px; height: 80px; background: var(--m3-primary); border-radius: 24px;
            animation: splash-anim 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes splash-anim {
            0% { transform: scale(0) rotate(-45deg); }
            50% { transform: scale(1.2) rotate(0deg); }
            100% { transform: scale(20); opacity: 0; }
        }

        /* ヘッダー：巨大検索バー */
        .header {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.9); display: flex;
            align-items: center; padding: 0 32px; z-index: 100; box-sizing: border-box;
        }
        .search-container {
            display: flex; flex: 1; height: 56px; background: #222;
            border-radius: 28px; padding: 0 24px; align-items: center;
            border: 1px solid #444; transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--m3-primary); background: #2a2a2a; }
        .search-container input {
            background: none; border: none; color: white; flex: 1; outline: none; font-size: 20px;
        }

        /* カテゴリ・検索フィルタ */
        .sub-header {
            position: fixed; top: 80px; width: 100%; background: black;
            padding: 10px 0; z-index: 99; display: flex; flex-direction: column; gap: 10px;
        }
        .scroll-row { display: flex; overflow-x: auto; padding: 0 24px; gap: 12px; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }

        .chip {
            background: #222; color: white; padding: 8px 20px; border-radius: 12px;
            border: none; cursor: pointer; white-space: nowrap; font-size: 14px; transition: 0.2s;
        }
        .chip.active { background: white; color: black; font-weight: bold; }

        /* コンテンツエリア */
        .content-area {
            margin-top: 160px; height: calc(100vh - 250px);
            overflow-y: auto; padding: 0 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;
        }

        /* 動画カード */
        .video-card { cursor: pointer; transition: transform 0.2s; }
        .video-card:active { transform: scale(0.98); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 16px; object-fit: cover; background: #111; }
        .video-info { display: flex; gap: 12px; margin-top: 12px; }
        .channel-icon { width: 44px; height: 44px; border-radius: 50%; background: #333; overflow: hidden; flex-shrink: 0; }
        .channel-icon img { width: 100%; height: 100%; object-fit: cover; }
        .video-text strong { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 16px; }
        .video-text p { font-size: 14px; color: #aaa; margin: 4px 0 0; }

        /* 中央寄せタブバー (Material 3 Expressive) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .nav-container { display: flex; align-items: center; gap: 30px; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: #888; width: 70px; cursor: pointer; position: relative;
        }
        .nav-item.active { color: var(--m3-primary); }
        .nav-item p { font-size: 11px; margin: 6px 0 0; font-weight: 500; }
        .nav-item .material-symbols-rounded { font-size: 28px; }

        .create-btn {
            width: 72px; height: 72px; background: #222; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #444; transition: 0.3s;
        }
        .create-btn:active { transform: scale(0.9) rotate(90deg); }
        .create-btn .material-symbols-rounded { font-size: 40px; color: white; }

        /* 巨大プレイヤー */
        #player-overlay {
            position: fixed; inset: 0; background: black; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .iframe-container { width: 100vw; height: 56.25vw; max-height: 80vh; background: #000; }

        /* 設定用スイッチ */
        .m3-switch {
            width: 52px; height: 32px; background: #444; border-radius: 16px;
            position: relative; cursor: pointer; transition: 0.3s;
        }
        .m3-switch.on { background: var(--m3-primary); }
        .m3-switch::after {
            content: ''; position: absolute; top: 4px; left: 4px;
            width: 24px; height: 24px; background: white; border-radius: 50%; transition: 0.3s;
        }
        .m3-switch.on::after { left: 24px; background: var(--m3-on-primary); }

    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-logo"></div></div>

    <header class="header">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="YouTube を検索" onkeypress="if(event.key==='Enter') startSearch()">
            <span class="material-symbols-rounded" onclick="startSearch()" style="cursor:pointer">search</span>
        </div>
    </header>

    <div class="sub-header">
        <div class="scroll-row" id="catRow">
            <button class="chip active" onclick="filterCat('すべて', this)">すべて</button>
            <button class="chip" onclick="filterCat('Minecraft', this)">Minecraft</button>
            <button class="chip" onclick="filterCat('にゃんこ大戦争', this)">にゃんこ大戦争</button>
            <button class="chip" onclick="filterCat('音楽', this)">音楽</button>
            <button class="chip" onclick="filterCat('最新ガジェット', this)">ガジェット</button>
        </div>
        <div class="scroll-row" id="searchFilterRow" style="display:none;">
            <button class="chip active" onclick="setSearchType('video', this)">動画</button>
            <button class="chip" onclick="setSearchType('channel', this)">チャンネル</button>
        </div>
    </div>

    <main id="main-content" class="content-area"></main>

    <div id="player-overlay">
        <div style="width: 100%; padding: 10px 20px;"><span class="material-symbols-rounded" onclick="closePlayer()" style="cursor:pointer">expand_more</span></div>
        <div class="iframe-container" id="player-container"></div>
        <div id="video-details" style="padding:20px; width:100%; box-sizing:border-box;"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" id="nav-home" onclick="tab('home')"><span class="material-symbols-rounded">home</span><p>ホーム</p></div>
            <div class="nav-item" id="nav-search" onclick="tab('search')"><span class="material-symbols-rounded">search</span><p>検索</p></div>
            <div class="create-btn" onclick="alert('作成機能：準備中')"><span class="material-symbols-rounded">add</span></div>
            <div class="nav-item" id="nav-subs" onclick="tab('subs')"><span class="material-symbols-rounded">subscriptions</span><p>登録済み</p></div>
            <div class="nav-item" id="nav-settings" onclick="tab('settings')"><span class="material-symbols-rounded">settings</span><p>設定</p></div>
        </div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo';
        let currentSearchType = 'video';

        window.onload = () => {
            setTimeout(() => document.getElementById('splash-screen').style.display='none', 1500);
            fetchPopular();
        };

        // --- タブ切り替え ---
        function tab(name) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('nav-' + name).classList.add('active');
            
            const main = document.getElementById('main-content');
            const filters = document.getElementById('searchFilterRow');
            
            if(name === 'home') {
                filters.style.display = 'none';
                fetchPopular();
            } else if(name === 'search') {
                filters.style.display = 'flex';
                main.innerHTML = '<p style="text-align:center; width:100%;">検索ワードを入力してください</p>';
            } else if(name === 'settings') {
                filters.style.display = 'none';
                main.innerHTML = `
                    <div style="width:100%; grid-column: 1 / -1;">
                        <h2>設定</h2>
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:20px; border-radius:16px;">
                            <span>Material 3 Expressive UI </span>
                            <div class="m3-switch on" onclick="this.classList.toggle('on')"></div>
                        </div>
                    </div>`;
            }
        }

        // --- YouTube API 呼び出し ---
        async function fetchPopular() {
            const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=24&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            render(data.items);
        }

        async function startSearch() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            tab('search');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=${currentSearchType}&maxResults=24&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            render(data.items);
        }

        function setSearchType(type, btn) {
            currentSearchType = type;
            document.querySelectorAll('#searchFilterRow .chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            startSearch();
        }

        function filterCat(word, btn) {
            document.querySelectorAll('#catRow .chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('searchInput').value = word;
            startSearch();
        }

        // --- 動画描画 & アイコン取得 ---
        async function render(items) {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            for (const item of items) {
                const id = item.id.videoId || item.id;
                const snip = item.snippet;
                const channelId = snip.channelId;

                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img class="thumbnail" src="${snip.thumbnails.high.url}" onclick="openPlayer('${id}', '${escape(snip.title)}')">
                    <div class="video-info">
                        <div class="channel-icon" id="icon-${id}-${channelId}">
                            <div style="width:100%; height:100%; background:#333;"></div>
                        </div>
                        <div class="video-text">
                            <strong onclick="openPlayer('${id}')">${snip.title}</strong>
                            <p>${snip.channelTitle}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // アイコンを非同期で取得して差し替える
                fetchChannelIcon(channelId, `icon-${id}-${channelId}`);
            }
        }

        async function fetchChannelIcon(channelId, elementId) {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${channelId}&key=${API_KEY}`);
                const data = await res.json();
                const imgUrl = data.items[0].snippet.thumbnails.default.url;
                document.getElementById(elementId).innerHTML = `<img src="${imgUrl}">`;
            } catch(e) {
                console.log("Icon error");
            }
        }

        // --- プレイヤー操作 ---
        function openPlayer(id, title) {
            document.getElementById('player-overlay').style.display = 'flex';
            document.getElementById('player-container').innerHTML = `
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('video-details').innerHTML = `<h3>${unescape(title)}</h3>`;
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('player-container').innerHTML = '';
        }
    </script>
</body>
</html>
