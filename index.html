<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YangTube V3.7</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --m3-primary: #d0bcff;
            --m3-on-primary: #381e72;
            --surface: #1c1b1f;
            --on-surface: #e6e1e5;
            --bg: #000000;
        }

        body {
            margin: 0; background: var(--bg); color: var(--on-surface);
            font-family: 'Roboto', sans-serif; overflow: hidden;
        }

        /* 検索バー修正（はみ出し防止） */
        .header {
            position: fixed; top: 0; width: 100%; height: 65px;
            display: flex; align-items: center; padding: 0 16px; z-index: 1000; box-sizing: border-box; background: var(--bg);
        }
        .search-container {
            flex: 1; height: 45px; background: var(--surface); border-radius: 25px;
            display: flex; align-items: center; padding: 0 15px; overflow: hidden;
        }
        .search-container input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 15px; }

        /* 動画/チャンネル 切り替え */
        .search-toggle { display: flex; gap: 8px; margin-left: 10px; }
        .toggle-btn { font-size: 12px; padding: 5px 12px; border-radius: 15px; border: 1px solid #444; background: none; color: white; cursor: pointer; }
        .toggle-btn.active { background: var(--m3-primary); color: var(--m3-on-primary); border: none; }

        /* カテゴリ & 更新ボタン */
        .sub-header {
            position: fixed; top: 65px; width: 100%; height: 50px;
            display: flex; align-items: center; padding: 0 16px; gap: 10px; overflow-x: auto; z-index: 999; background: var(--bg);
        }
        .chip { padding: 8px 16px; background: var(--surface); border-radius: 10px; font-size: 13px; white-space: nowrap; cursor: pointer; border: none; color: white; }
        .chip.active { background: var(--m3-primary); color: var(--m3-on-primary); }
        .reload-btn { background: #2a2a2a; color: var(--m3-primary); border: 1px solid #444; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }

        /* コンテンツ（サムネイル比率修正） */
        .content {
            margin-top: 115px; height: calc(100vh - 210px); overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 10px 20px;
        }
        .v-card { cursor: pointer; transition: 0.2s; }
        .v-card:active { transform: scale(0.98); }
        .v-thumb { width: 100%; aspect-ratio: 16 / 9; border-radius: 12px; object-fit: cover; background: #222; }
        .v-meta { display: flex; gap: 12px; margin-top: 10px; }
        .ch-icon { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .v-text strong { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 14px; line-height: 1.4; }
        .v-text p { color: #aaa; font-size: 12px; margin: 4px 0 0; }

        /* フローティングタブバー（アイコン塗りつぶし対応） */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            height: 75px; background: rgba(30, 30, 30, 0.95); border-radius: 38px;
            display: flex; align-items: center; padding: 0 10px; gap: 5px; z-index: 3000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .nav-item { width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; }
        .nav-item .material-symbols-rounded { font-size: 26px; transition: 0.2s; font-variation-settings: 'FILL' 0; }
        .nav-item.active { color: var(--m3-primary); }
        .nav-item.active .material-symbols-rounded { font-variation-settings: 'FILL' 1; }
        .nav-item span { font-size: 10px; margin-top: 4px; }
        .fab { width: 55px; height: 55px; background: var(--m3-primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 10px; color: var(--m3-on-primary); }

        /* 独自チャンネルUI */
        #channel-ui { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; overflow-y: auto; }

        /* 更新履歴のデザイン */
        .ver-badge { display: inline-block; padding: 2px 8px; border: 1px solid var(--m3-primary); border-radius: 10px; color: var(--m3-primary); font-size: 11px; margin-right: 10px; font-weight: bold; }
        .history-item { margin-bottom: 12px; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <header class="header">
        <div class="search-container">
            <input type="text" id="q" placeholder="YangTubeを検索" onkeypress="if(event.key==='Enter') search()">
            <span class="material-symbols-rounded" style="padding-right:10px" onclick="search()">search</span>
        </div>
        <div class="search-toggle">
            <button class="toggle-btn active" id="type-video" onclick="setSearchType('video')">動画</button>
            <button class="toggle-btn" id="type-channel" onclick="setSearchType('channel')">ch</button>
        </div>
    </header>

    <div class="sub-header" id="subHeader">
        <button class="reload-btn" onclick="fetchHome()"><span class="material-symbols-rounded">refresh</span>更新</button>
        <button class="chip active" onclick="cat('すべて')">すべて</button>
        <button class="chip" onclick="cat('Minecraft')">Minecraft</button>
        <button class="chip" onclick="cat('にゃんこ大戦争')">にゃんこ</button>
    </div>

    <main class="content" id="view"></main>

    <div id="channel-ui"></div>

    <nav class="nav-bar">
        <div class="nav-item active" id="t-home" onclick="go('home')"><span class="material-symbols-rounded">home</span><span>ホーム</span></div>
        <div class="nav-item" id="t-search" onclick="go('search')"><span class="material-symbols-rounded">search</span><span>検索</span></div>
        <div class="fab" onclick="alert('作成機能：準備完了')"><span class="material-symbols-rounded">add</span></div>
        <div class="nav-item" id="t-subs" onclick="go('subs')"><span class="material-symbols-rounded">subscriptions</span><span>登録済み</span></div>
        <div class="nav-item" id="t-sets" onclick="go('sets')"><span class="material-symbols-rounded">settings</span><span>設定</span></div>
    </nav>

    <script>
        const API_KEY = 'AIzaSyCsAe_J968Z05UXBbqHHhI7iVSZMnjyTdo';
        let searchType = 'video';
        let registeredSubs = JSON.parse(localStorage.getItem('yt_subs') || '["UC8m..."]'); // 初期値を設定可能

        window.onload = () => fetchHome();

        function setSearchType(type) {
            searchType = type;
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('type-'+type).classList.add('active');
        }

        function go(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('t-'+tab).classList.add('active');
            document.getElementById('subHeader').style.display = (tab === 'home') ? 'flex' : 'none';
            document.getElementById('view').style.marginTop = (tab === 'home') ? '115px' : '70px';
            if(tab === 'home') fetchHome();
            if(tab === 'sets') renderSettings();
            if(tab === 'subs') fetchSubs();
        }

        async function fetchHome() {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=JP&maxResults=30&key=${API_KEY}`);
            const data = await res.json();
            renderList(data.items);
        }

        async function search() {
            const q = document.getElementById('q').value;
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=${searchType}&maxResults=50&regionCode=JP&key=${API_KEY}`);
            const data = await res.json();
            renderList(data.items);
        }

        function renderList(items) {
            const v = document.getElementById('view');
            v.innerHTML = items.map(i => {
                const s = i.snippet;
                const id = i.id.videoId || i.id;
                return `
                <div class="v-card" onclick="play('${id}')">
                    <img class="v-thumb" src="${s.thumbnails.high.url}">
                    <div class="v-meta">
                        <img class="ch-icon" src="https://ui-avatars.com/api/?name=${s.channelTitle}" id="icon-${s.channelId}">
                        <div class="v-text">
                            <strong>${s.title}</strong>
                            <p onclick="event.stopPropagation(); openChannelUI('${s.channelId}')">${s.channelTitle}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openChannelUI(cid) {
            const ui = document.getElementById('channel-ui');
            ui.style.display = 'block';
            ui.innerHTML = `<div style="padding:20px; display:flex; align-items:center; gap:10px" onclick="this.parentElement.style.display='none'">
                <span class="material-symbols-rounded">arrow_back</span> 戻る
            </div><div id="ch-list" class="content" style="margin-top:0"></div>`;
            // チャンネル動画取得ロジック
        }

        function renderSettings() {
            const h = [];
            // 1.0~1.5
            for(let i=1.0; i<=1.5; i=+(i+0.1).toFixed(1)) h.push({v: i, t: "システム基盤の構築"});
            // 2.0~2.7
            for(let i=2.0; i<=2.7; i=+(i+0.1).toFixed(1)) h.push({v: i, t: "API連携と検索機能の強化"});
            // 3.0~3.7
            for(let i=3.0; i<=3.7; i=+(i+0.1).toFixed(1)) h.push({v: i, t: i===3.7 ? "レイアウト修正 & 検索フィルタ実装" : "Material 3 UI 調整"});

            document.getElementById('view').innerHTML = `
                <h2 style="padding:0 10px">設定</h2>
                <div style="padding:10px">
                    <h3>更新履歴</h3>
                    <div style="background:#111; border-radius:15px; padding:10px; height:400px; overflow-y:auto">
                        ${h.reverse().map(item => `
                            <div class="history-item">
                                <span class="ver-badge">V ${item.v.toFixed(1)}</span>
                                <span style="font-size:13px">${item.t}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        async function fetchSubs() {
            // 登録チャンネルIDリストから最新動画を各3本ずつ取得して結合
            document.getElementById('view').innerHTML = "読み込み中...";
        }

        function play(id) {
            window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
        }
    </script>
</body>
</html>
